<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./vue.js"></script>
</head>
<body>
    <div class="root">
        <button @click="student.age.Rage++">年龄+1</button>
        <button @click="addsex">添加性别属性为男</button>
        <button @click="addfriend">列表首位添加新朋友</button>
        <button @click="student.sex='weizhi'">修改性别</button>
        <button @click="changefirstname">修改第一个朋友的名字</button>
        <button @click="addhobby">添加要给爱好</button>
        <button @click="updatehobby">更改第一个爱好</button>
        <button @click="removesmoke">移除抽烟</button>








        <h2>学校名称：{{name}}</h2>
        <h2>学校地址：{{address}}</h2>
        <hr>
        <h2>学生姓名：{{student.name}}</h2>
        
        <h2 v-if="student.sex">学生性别：{{student.sex}}</h2>
        <h2>学生年龄：{{student.age.Rage}},对外{{student.age.Sage}}</h2>
        <h2>朋友们</h2>
        <ul>
            <li v-for='p in student.friends'>{{p.name}}-{{p.age}}</li>
        </ul>
        <h2>爱好</h2>
        <ul>
            <li v-for='(f,index) in     hobby'>{{f}}</li>
        </ul>
    

    </div>
    <script>
        Vue.config.productionTip = false;
        const vm=new Vue({
            el:'.root',
            data:{
                name:'尚硅谷',
                 address:'北京',
                student:{
                name:'tom',
                age:{
                    Rage:40,
                    Sage:29,
                },
                friends:[
                    {name:'jerry',age:35}
                    
                ]
            },
                 hobby:['抽烟','喝酒','烫头']

            },
            methods: {
                addsex(){
                    Vue.set(this.student,'sex','男')
                },
                addfriend(){
                     this.student.friends.unshift({name:'jerry',age:20})
                },
                changefirstname(){
                    Vue.set(this.student.friends[0],'name','wangxin')
                },
                addhobby(){
                    this.hobby.unshift('划船')
                },
                updatehobby(){
                    Vue.set(this.hobby,0,'drive')
                },
                removesmoke(){
                    this.hobby=this.hobby.filter((p)=>{
                        return p!='抽烟'
                    })
                }
                
            },
           
        })
    </script>
    
</body>
</html>
